spring:
  application:
    name: tobyremider

  profiles:
    active: dev

  datasource:
    url: jdbc:h2:mem:tobyremider
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
